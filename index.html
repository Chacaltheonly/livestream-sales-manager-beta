
<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aplicativo para gestao de estoque, consulta de preco e registro de vendas em lives."
    />
    <title>LiveStream Sales Manager</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --brand-green-950: #064e2b;
        --brand-green-900: #0b6b3b;
        --brand-green-800: #0e7f47;
        --brand-green-700: #109155;
        --brand-green-600: #14935a;
        --brand-green-500: #17a265;
        --brand-green-300: #9ed9b8;
        --brand-green-200: #cbeed9;
        --brand-green-100: #e8f7ef;
        --brand-red-500: #ff3138;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: #f8fafc;
      }

      .bg-indigo-950 {
        background-color: var(--brand-green-950) !important;
      }

      .bg-indigo-900 {
        background-color: var(--brand-green-900) !important;
      }

      .bg-indigo-800 {
        background-color: var(--brand-green-800) !important;
      }

      .bg-indigo-700 {
        background-color: var(--brand-green-700) !important;
      }

      .bg-indigo-600 {
        background-color: var(--brand-green-600) !important;
      }

      .bg-indigo-500 {
        background-color: var(--brand-green-500) !important;
      }

      .bg-indigo-100,
      .bg-indigo-50 {
        background-color: var(--brand-green-100) !important;
      }

      .text-indigo-600,
      .text-indigo-500 {
        color: var(--brand-green-600) !important;
      }

      .text-indigo-400,
      .text-indigo-300,
      .text-indigo-200 {
        color: var(--brand-green-300) !important;
      }

      .border-indigo-900,
      .border-indigo-800 {
        border-color: rgba(232, 247, 239, 0.12) !important;
      }

      .border-indigo-300,
      .border-indigo-200,
      .border-indigo-100 {
        border-color: var(--brand-green-200) !important;
      }

      .hover\:bg-indigo-900:hover {
        background-color: var(--brand-green-900) !important;
      }

      .hover\:bg-indigo-800:hover,
      .hover\:bg-indigo-700:hover {
        background-color: var(--brand-green-800) !important;
      }

      .hover\:bg-indigo-50:hover {
        background-color: var(--brand-green-100) !important;
      }

      .hover\:border-indigo-300:hover,
      .focus\:border-indigo-500:focus {
        border-color: var(--brand-green-500) !important;
      }

      .group-hover\:text-indigo-600:hover,
      .group:hover .group-hover\:text-indigo-600 {
        color: var(--brand-green-600) !important;
      }

      .focus\:ring-indigo-500:focus {
        --tw-ring-color: rgba(20, 147, 90, 0.32) !important;
      }

      .focus\:ring-indigo-50\/50:focus {
        --tw-ring-color: rgba(232, 247, 239, 0.8) !important;
      }

      .from-purple-500 {
        --tw-gradient-from: var(--brand-green-500) var(--tw-gradient-from-position) !important;
        --tw-gradient-to: rgb(23 162 101 / 0) var(--tw-gradient-to-position) !important;
        --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to) !important;
      }

      .text-purple-500 {
        color: var(--brand-green-500) !important;
      }

      .brand-mark-box {
        padding: 0.35rem !important;
      }

      .brand-mark-box img {
        display: block;
        width: 2rem;
        height: 2rem;
        object-fit: contain;
      }

      .report-status-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
        margin-top: 0.75rem;
      }

      .report-filter-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .report-filter-button {
        border: 1px solid #dbe5ef;
        background: white;
        color: #475569;
        padding: 0.5rem 0.8rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .report-filter-button:hover {
        border-color: var(--brand-green-300);
        background: var(--brand-green-100);
        color: var(--brand-green-900);
      }

      .report-filter-button.active {
        background: var(--brand-green-600);
        border-color: var(--brand-green-600);
        color: white;
      }

      .report-status-reset {
        border: 1px solid var(--brand-green-200);
        background: var(--brand-green-100);
        color: var(--brand-green-900);
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        font-size: 0.78rem;
        font-weight: 700;
        cursor: pointer;
      }

      .report-status-reset:hover {
        background: #d8f2e3;
      }

      .report-customer-tools {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }

      .report-switch-group {
        display: inline-flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.35rem 0.55rem;
        border: 1px solid #e2e8f0;
        background: #ffffff;
        border-radius: 999px;
      }

      .report-switch-label {
        font-size: 0.76rem;
        font-weight: 700;
        color: #475569;
      }

      .report-switch {
        position: relative;
        width: 2.7rem;
        height: 1.5rem;
        border: none;
        border-radius: 999px;
        background: #cbd5e1;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .report-switch::after {
        content: "";
        position: absolute;
        top: 0.16rem;
        left: 0.18rem;
        width: 1.15rem;
        height: 1.15rem;
        border-radius: 50%;
        background: white;
        box-shadow: 0 2px 6px rgba(15, 23, 42, 0.18);
        transition: transform 0.2s ease;
      }

      .report-switch.active-warned {
        background: #facc15;
      }

      .report-switch.active-picked {
        background: #22c55e;
      }

      .report-switch.active-warned::after,
      .report-switch.active-picked::after {
        transform: translateX(1.18rem);
      }

      .report-customer-button {
        border: 1px solid #dbe5ef;
        background: white;
        color: #334155;
        padding: 0.42rem 0.75rem;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s ease;
      }

      .report-customer-button:hover {
        border-color: var(--brand-green-300);
        color: var(--brand-green-900);
        background: var(--brand-green-100);
      }

      .report-customer-button.danger {
        background: #fff1f2;
        border-color: #fecdd3;
        color: #be123c;
      }

      .report-card-muted {
        border-color: #bbf7d0 !important;
        box-shadow: 0 8px 20px rgba(20, 147, 90, 0.08) !important;
      }

      .report-card-muted > div:first-child {
        background: #f0fdf4 !important;
      }
    </style>
    <script src="./sheets-config.js"></script>
    <script src="./sheet-sync.js"></script>
    <script src="./brand-customizer.js"></script>
    <script src="./report-status-enhancer.js"></script>
    <script type="module">
      await (window.__LIVESELL_BOOTSTRAP__ ?? Promise.resolve());
      await import("./assets/index-DGoMSP5w.js");
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
  </body>
</html>
